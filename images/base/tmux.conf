# Make tmux disappear. The box's claude IS the real CLI — these settings strip
# tmux's UI so `gent attach` feels like a local `claude`, not a multiplexer.
# System-wide (/etc/tmux.conf) so a home-volume mount can't shadow it; bootstrap
# no longer writes ~/.tmux.conf, so this is the single source of truth.
set  -g  default-terminal "screen-256color"
set  -g  status off                          # no status bar — claude owns the full screen
set  -g  mouse on                            # wheel scrolls claude's TUI; ⌥/Shift-drag = native select
set  -g  focus-events on                     # claude wants to know when the pane is focused
set  -g  set-clipboard on                    # OSC52: copy OUT of the box to the host clipboard
set  -gq allow-passthrough on                # let claude's escape sequences pass straight through
set  -sg escape-time 10                      # snappy ESC for the TUI without misreading sequences
set  -g  history-limit 100000
set  -as terminal-features ",*:RGB:extkeys"  # advertise 24-bit truecolor + extended keys to apps
set  -s  extended-keys on                    # pass Shift+Enter / modified keys through to claude
